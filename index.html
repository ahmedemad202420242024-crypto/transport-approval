<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اعتماد طلب النقل</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #ffffff;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }
        h2 { margin-bottom: 15px; }
        .loading { font-size: 18px; color: #555; }
        .success { color: #27ae60; font-weight: bold; font-size: 22px; }
        .error-box { color: #c0392b; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

    <div class="card" id="contentCard">
        <h2>⏳ جاري معالجة الطلب...</h2>
        <p class="loading">يرجى الانتظار لحظات لتسجيل القرار في النظام.</p>
    </div>

    <script>
        // استخراج رقم الصف والحالة من الرابط القادم من البريد الإلكتروني
        const urlParams = new URLSearchParams(window.location.search);
        const row = urlParams.get('row');
        const status = urlParams.get('status');

        // رابط الـ Web App الخاص بك في جوجل سكريبت
        const scriptUrl = "https://script.google.com/macros/s/AKfycbzg1feKkSCcVwWe6l_6gbSo58L5dbBr7W8Ymu_Rwf8DFq3xTWhTlv3rJs1NLpEE8id4/exec";

        const card = document.getElementById('contentCard');

        if (row && status) {
            // تجهيز رابط الإرسال
            const targetUrl = `${scriptUrl}?row=${row}&status=${encodeURIComponent(status)}`;
            
            // استخدام تقنية الـ Image لضرب رابط السكريبت في الخلفية بصمت تام ودون تحويل الصفحة أو فتح أي نافذة جوجل
            const img = new Image();
            img.src = targetUrl;

            // بعد جزء من الثانية، نفترض النجاح ونحدث واجهة المستخدم للمدير وهو في صفحة جيت هاب الخاصة بك
            setTimeout(function() {
                card.innerHTML = `
                    <h2 class="success">تم تسجيل قرارك بنجاح! ✅</h2>
                    <p style="color: #666; font-size: 16px; margin-top: 10px;">تم تحديث حالة الطلب رقم (<strong>${row}</strong>) إلى: <br><span style="color: #2c3e50; font-weight: bold; font-size: 18px;">${status}</span></p>
                    <p style="color: #888; font-size: 13px; margin-top: 20px;">يمكنك إغلاق هذه الصفحة الآن بأمان.</p>
                `;
            }, 1000);

        } else {
            card.innerHTML = `
                <h2 style="color: #c0392b;">❌ خطأ في الرابط</h2>
                <p class="error-box">عذراً، بيانات الطلب غير مكتملة أو مفقودة.</p>
            `;
        }
    </script>

</body>
</html>
