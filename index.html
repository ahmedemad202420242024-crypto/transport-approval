<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معالجة طلب النقل</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 100px; background-color: #f9f9f9; }
        .box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); display: inline-block; max-width: 500px; }
        h2 { color: #333; }
        p { color: #666; font-size: 18px; }
    </style>
</head>
<body>

    <div class="box">
        <h2 id="msg">جاري معالجة القرار وتحديث النظام...</h2>
        <p id="sub-msg">يرجى الانتظار لحظات قليلة.</p>
    </div>

    <script>
        // استخراج رقم الصف والحالة من الرابط (URL)
        const urlParams = new URLSearchParams(window.location.search);
        const row = urlParams.get('row');
        const status = urlParams.get('status');

        // رابط النشر الخاص بـ Google Apps Script الذي أرسلته
        const scriptWebUrl = "https://script.google.com/macros/s/AKfycbzg1feKkSCcVwWe6l_6gbSo58L5dbBr7W8Ymu_Rwf8DFq3xTWhTlv3rJs1NLpEE8id4/exec"; 

        if (row && status) {
            // إرسال البيانات إلى جوجل شيت خلف الكواليس
            fetch(`${scriptWebUrl}?row=${row}&status=${encodeURIComponent(status)}`)
                .then(response => {
                    document.getElementById('msg').innerHTML = "تم تسجيل القرار (" + status + ") بنجاح! ✅";
                    document.getElementById('sub-msg').innerHTML = "تم تحديث الصف رقم " + row + " في النظام بنجاح. يمكنك إغلاق هذه الصفحة.";
                    document.getElementById('msg').style.color = "green";
                })
                .catch(error => {
                    document.getElementById('msg').innerHTML = "حدث خطأ أثناء الاتصال بالنظام ❌";
                    document.getElementById('sub-msg').innerHTML = error.toString();
                    document.getElementById('msg').style.color = "red";
                });
        } else {
            document.getElementById('msg').innerHTML = "بيانات غير مكتملة ❌";
            document.getElementById('sub-msg').innerHTML = "الرابط لا يحتوي على رقم الصف أو الحالة.";
            document.getElementById('msg').style.color = "red";
        }
    </script>

</body>
</html>
